        - heading "Zapier & middleware" [level=4] [ref=e703]:
          - img [ref=e705]
          - text: Zapier & middleware
        - paragraph [ref=e707]: A Zap fires once and vanishes — no status on the contact, no worklist, no way to nudge. And it pushes your customers into a third tool, out of your platform.
      - generic [ref=e708]:
