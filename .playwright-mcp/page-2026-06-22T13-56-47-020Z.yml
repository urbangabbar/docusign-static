  - generic [ref=e286]:
    - heading "Your customers are chasing signatures outside your CRM." [level=2] [ref=e287]
    - paragraph [ref=e288]: Every agency on your platform runs on DocuSign — but the moment they send one, they tab out of your CRM to check "did they sign yet?" It's the gap your customers feel every day, and the one thing a white-labeled HighLevel platform can't show them natively. The signing isn't the hard part. The chasing is — and right now it happens outside your product.
