  - generic [ref=e112]:
    - heading "What is the HighLevel DocuSign integration?" [level=2] [ref=e113]
    - paragraph [ref=e114]: The HighLevel DocuSign integration by LC Bridge connects your DocuSign account to the HighLevel (GoHighLevel) CRM. It lets you send DocuSign envelopes directly from your HighLevel workflows, auto-fills each document from your contact fields, and writes the signed status back to the contact record — so a completed signature can trigger your next automated step. It installs as a white-label add-on inside your sub-account, with no code required.
