  - generic [ref=e91]:
    - heading "What is the HighLevel Google Sheets integration?" [level=2] [ref=e92]
    - paragraph [ref=e93]: The HighLevel Google Sheets integration by LC Bridge keeps a live, two-way sync between the HighLevel (GoHighLevel) CRM and a Google Sheet. Update a contact or pipeline stage in HighLevel and the sheet updates automatically; edit a row in the sheet and HighLevel catches up. A spreadsheet change can even trigger a HighLevel workflow. It installs as a white-label add-on inside your sub-account — no code required.
